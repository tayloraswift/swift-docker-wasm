name: Build Swift WebAssembly SDK

on:
    workflow_call:
        inputs:
            swift-prefix:
                description: 'swift toolchain url prefix'
                required: true
                type: string
            swift-id:
                description: 'swift toolchain identifier'
                required: true
                type: string
            wasi-sdk:
                description: 'the wasi sdk version to use'
                required: true
                type: string

jobs:
    WebAssembly:
        runs-on: ubuntu-24.04
        steps:
            -   name: 💝 Checkout swift-sdk-generator 💝
                uses: actions/checkout@v6
                with:
                    repository: swiftlang/swift-sdk-generator

            -   name: 💝 Install Swift 💝
                uses: rarestype/swift-install-action@v1
                with:
                    swift-prefix: ${{ inputs.swift-prefix }}
                    swift-id: ${{ inputs.swift-id }}

            -   name: 💝 Download wasi-sdk 💝
                run: Scripts/BuildSDK
                env:
                    WASI_SDK_VERSION: ${{ inputs.wasi-sdk }}
                run: |
                    WASI_SDK_URL="https://github.com/WebAssembly/wasi-sdk/releases/download/\
                    wasi-sdk-${WASI_SDK_VERSION}/wasi-sysroot-${WASI_SDK_VERSION}.0.tar.gz"

                    curl -fLS "$WASI_SDK_URL" -o wasi-sysroot.tar.gz

                    mkdir wasi-sysroot
                    tar -xzf wasi-sysroot.tar.gz -C wasi-sysroot --strip-components=1
                    rm wasi-sysroot.tar.gz

            -   name: 💝 Build SDK generator 💝
                run: |
                    swift build -c release --product swift-sdk-generator
                    mv .build/release/swift-sdk-generator .

            -   name: 💝 Build SDK 💝
                run: |
                    for target in wasm32-unknown-wasip1-threads wasm32-unknown-wasip1; do
                        ./swift-sdk-generator make-wasm-sdk \
                            --target "$target" \
                            --wasi-sysroot wasi-sysroot

                        tar -czf "${target}.artifactbundle" \
                            -C Bundles wasm.artifactbundle
                    done

            -   name: 💝 Upload SDK artifacts 💝
                uses: actions/upload-artifact@v7
                with:
                    name: swift-wasm-sdk-bundle
                    path: ./*.artifactbundle.zip
                    retention-days: 1
