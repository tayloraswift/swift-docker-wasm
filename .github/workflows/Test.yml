name: test

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    build-sdk:
        name: Build Swift WebAssembly SDK
        uses: ./.github/workflows/BuildSDK.yml
        with:
            swift-prefix: 'swift-6.3-release/ubuntu2404/swift-6.3-RELEASE'
            swift-id: 'swift-6.3-RELEASE-ubuntu24.04'
            wasi-sdk: '32'

    test:
        name: Test WebAssembly compilation
        runs-on: ubuntu-latest
        needs: [build-sdk]
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Download artifacts 💖
                uses: actions/download-artifact@v8
                with:
                    name: swift-wasm-sdk-bundle
                    path: Bundles

            -   name: 💖 List artifacts 💖
                run: ls -l Bundles

            -   name: 💖 Add permissions for Docker 💖
                run: chmod -R a+w Tests/

            -   name: 💖 Test WebAssembly compilation 💖
                run: Scripts/TestAll
